library(ggplot2)

ggplot(data = my_high_dimensional_data) + 
  aes(dims = dims(var1:var200, var205)) +   # &lt;&lt;   
  geom_dimred_technique()  # e.g. geom_pca(), geom_tsne(), geom_umap()             
```

``` r
library(ggdims)
ggplot(unga_rcid_wide) + 
* aes(dims = dims(rc3:rc9147)) +

  aes(fill = continent) +
  labs(title = "PCA") -&gt;
unga_pca
